apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nginx-le-tls
  namespace: nginx
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  secretName: nginx-le-tls
  duration: 2160h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
  dnsNames:
  - seddon.ca
  - xtcp.io
  issuerRef:
    name: letsencrypt-prod-dns01
    kind: ClusterIssuer
    group: cert-manager.io

