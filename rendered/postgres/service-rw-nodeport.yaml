apiVersion: v1
kind: Service
metadata:
  name: pg-rw-nodeport
  namespace: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  type: NodePort
  selector:
    cnpg.io/cluster: pg
    cnpg.io/instanceRole: primary
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
    nodePort: 30500

