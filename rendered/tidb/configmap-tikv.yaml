apiVersion: v1
kind: ConfigMap
metadata:
  name: tikv-config
  namespace: tidb
data:
  start-tikv.sh: |
    #!/bin/sh
    set -e
    HOSTNAME=$(hostname)
    exec /tikv-server \
      --pd=pd-0.pd-headless.tidb.svc.cluster.local:2379,pd-1.pd-headless.tidb.svc.cluster.local:2379,pd-2.pd-headless.tidb.svc.cluster.local:2379 \
      --addr=0.0.0.0:20160 \
      --advertise-addr=${HOSTNAME}.tikv-headless.tidb.svc.cluster.local:20160 \
      --status-addr=0.0.0.0:20180 \
      --data-dir=/data/tikv \
      --config=/config/tikv.toml
  tikv.toml: |
    [storage]
    reserve-space = "512MB"
    [storage.block-cache]
    capacity = "512MB"
    [memory]
    enable-heap-profiling = false
