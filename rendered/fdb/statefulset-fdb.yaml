apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fdb
  namespace: fdb
spec:
  serviceName: fdb-headless
  # 4 fdbserver processes across cp0/cp1/cp2/w3. Only fdb-0..2 are
  # coordinators (see fdb.cluster in configmap); fdb-3 joins as a
  # storage/log peer. Triple-ssd replication + 1 spare node →
  # survives a single-node failure with zero data-path impact.
  replicas: 4
  selector:
    matchLabels:
      app: fdb
  template:
    metadata:
      labels:
        app: fdb
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: fdb
            topologyKey: kubernetes.io/hostname
      containers:
      - name: fdb
        image: foundationdb/foundationdb:7.3.27
        command: ["/bin/sh", "/config/start-fdb.sh"]
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        ports:
        - containerPort: 4500
          name: fdb
        volumeMounts:
        - name: config
          mountPath: /config
        - name: fdb-config
          mountPath: /etc/fdb-config
        - name: data
          mountPath: /data
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: '1'
            memory: 2Gi
      volumes:
      - name: config
        configMap:
          name: fdb-config
          defaultMode: 0755
          items:
          - key: start-fdb.sh
            path: start-fdb.sh
      - name: fdb-config
        configMap:
          name: fdb-config
          items:
          - key: fdb.cluster
            path: fdb.cluster
      - name: data
        emptyDir: {}
