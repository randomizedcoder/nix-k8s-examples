apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: foundationdb
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/randomizedcoder/nix-k8s-examples.git
    targetRevision: main
    path: rendered/fdb
  destination:
    server: https://kubernetes.default.svc
    namespace: fdb
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
