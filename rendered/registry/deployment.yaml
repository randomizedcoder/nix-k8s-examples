apiVersion: apps/v1
kind: Deployment
metadata:
  name: zot
  namespace: registry
spec:
  # local-path PVC is RWO → single replica.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: zot
  template:
    metadata:
      labels:
        app: zot
    spec:
      containers:
      - name: zot
        image: ghcr.io/project-zot/zot-linux-amd64:v2.1.2
        args: ["serve", "/etc/zot/config.json"]
        ports:
        - name: https
          containerPort: 5000
        volumeMounts:
        - name: config
          mountPath: /etc/zot/config.json
          subPath: config.json
        - name: tls
          mountPath: /etc/zot/tls
          readOnly: true
        - name: auth
          mountPath: /etc/zot/auth
          readOnly: true
        - name: storage
          mountPath: /var/lib/registry
        readinessProbe:
          httpGet:
            path: /v2/
            port: 5000
            scheme: HTTPS
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /v2/
            port: 5000
            scheme: HTTPS
          initialDelaySeconds: 10
          periodSeconds: 30
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: config
        configMap:
          name: zot-config
      # TLS cert + key are populated into the registry-tls
      # Secret by the bootstrap script (it reads the
      # cluster-CA-signed leaf from the node PKI dir over
      # SSH). Mounting via Secret rather than hostPath means
      # the Deployment is not pinned to a specific node.
      - name: tls
        secret:
          secretName: registry-tls
          items:
          - key: tls.crt
            path: tls.crt
          - key: tls.key
            path: tls.key
      - name: auth
        secret:
          secretName: registry-htpasswd
          items:
          - key: htpasswd
            path: htpasswd
      - name: storage
        persistentVolumeClaim:
          claimName: zot-storage

