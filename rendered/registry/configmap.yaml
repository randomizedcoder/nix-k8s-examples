apiVersion: v1
kind: ConfigMap
metadata:
  name: zot-config
  namespace: registry
data:
  config.json: |
    {
      "distSpecVersion": "1.1.0",
      "storage": {
        "rootDirectory": "/var/lib/registry"
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000",
        "tls": {
          "cert": "/etc/zot/tls/tls.crt",
          "key":  "/etc/zot/tls/tls.key"
        },
        "auth": {
          "htpasswd": {
            "path": "/etc/zot/auth/htpasswd"
          }
        },
        "accessControl": {
          "repositories": {
            "**": {
              "anonymousPolicy": ["read"],
              "policies": [
                {
                  "users": ["pusher"],
                  "actions": ["read", "create", "update", "delete"]
                }
              ]
            }
          }
        }
      },
      "extensions": {
        "sync": {
          "enable": true,
          "registries": [
            {
              "urls": ["https://registry-1.docker.io"],
              "onDemand": true,
              "tlsVerify": true,
              "maxRetries": 3,
              "retryDelay": "5m",
              "content": [
                {
                  "prefix": "**"
                }
              ]
            },
            {
              "urls": ["https://registry.k8s.io"],
              "onDemand": true,
              "tlsVerify": true,
              "maxRetries": 3,
              "retryDelay": "5m",
              "content": [
                {
                  "prefix": "**"
                }
              ]
            }
          ]
        }
      },
      "log": {
        "level": "info"
      }
    }
    


