# Cilium Helm chart values
# Install via: helm install cilium cilium/cilium -n kube-system -f values.yaml
kubeProxyReplacement: true
k8sServiceHost: "10.33.33.1"
k8sServicePort: "6443"

ipam:
  mode: kubernetes

ipv4:
  enabled: true
ipv6:
  enabled: true

hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true

operator:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

resources:
  requests:
    cpu: 100m
    memory: 256Mi

