apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: pdns-auth
  namespace: pdns
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    app: pdns-auth
spec:
  selector:
    matchLabels:
      app: pdns-auth
  template:
    metadata:
      labels:
        app: pdns-auth
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        effect: "NoSchedule"
      initContainers:
      - name: template-config
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          sed "s|\$(API_KEY)|$API_KEY|g; s|\$(PG_PASSWORD)|$PG_PASSWORD|g" \
            /etc/pdns-template/pdns.conf > /etc/pdns/pdns.conf
        env:
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: pdns-credentials
              key: api-key
        - name: PG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pdns-credentials
              key: pg-password
        volumeMounts:
        - name: config-template
          mountPath: /etc/pdns-template
          readOnly: true
        - name: config-rendered
          mountPath: /etc/pdns
      containers:
      - name: pdns
        image: powerdns/pdns-auth-49:4.9.3
        args: ["--config-dir=/etc/pdns"]
        ports:
        - name: dns-udp
          containerPort: 53
          protocol: UDP
        - name: dns-tcp
          containerPort: 53
          protocol: TCP
        - name: api
          containerPort: 8081
          protocol: TCP
        securityContext:
          capabilities:
            add: ["NET_BIND_SERVICE"]
        readinessProbe:
          tcpSocket:
            port: 53
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 53
          initialDelaySeconds: 10
          periodSeconds: 30
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        volumeMounts:
        - name: config-rendered
          mountPath: /etc/pdns
          readOnly: true
      volumes:
      - name: config-template
        configMap:
          name: pdns-config
      - name: config-rendered
        emptyDir: {}

