apiVersion: v1
kind: Service
metadata:
  name: pdns-lb
  namespace: pdns
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    app: pdns-auth
spec:
  type: LoadBalancer
  loadBalancerIP: 10.33.33.52
  selector:
    app: pdns-auth
  ports:
  - name: dns-udp
    port: 53
    targetPort: 53
    protocol: UDP
  - name: dns-tcp
    port: 53
    targetPort: 53
    protocol: TCP

