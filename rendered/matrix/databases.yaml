apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: synapse
  namespace: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  name: synapse
  owner: app
  cluster:
    name: pg
  # Synapse prefers C locale for hash consistency; the in-cluster
  # CNPG CRD version does not expose localeCtype/localeCollate.
  # Accept whatever the cluster's template1 defaults to — revisit
  # if Synapse complains. Inherit from template0 for clean state.
  encoding: UTF8
  template: template0
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: maubot
  namespace: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  name: maubot
  owner: app
  cluster:
    name: pg
  encoding: UTF8
  template: template0
---
