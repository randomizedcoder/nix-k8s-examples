apiVersion: v1
kind: ConfigMap
metadata:
  name: mautrix-discord-registration
  namespace: matrix
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/compare-options: IgnoreExtraneous
data:
  registration.yaml: |
    id: discord
    url: http://mautrix-discord.matrix.svc.cluster.local:29334
    as_token: REPLACE_ME_MAUTRIX_DISCORD_AS_TOKEN
    hs_token: REPLACE_ME_MAUTRIX_DISCORD_HS_TOKEN
    sender_localpart: discordbot
    rate_limited: false
    namespaces:
      users:
      - exclusive: true
        regex: "@_discord_.*"
      aliases:
      - exclusive: true
        regex: "#_discord_.*"
      rooms: []
    de.sorunome.msc2409.push_ephemeral: true
    push_ephemeral: true

