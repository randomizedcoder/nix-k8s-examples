apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: matrix
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/randomizedcoder/nix-k8s-examples.git
    targetRevision: main
    path: rendered/matrix
    directory:
      recurse: false
      exclude: 'application.yaml'
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    # Appservice registration tokens are operator-rotated after
    # deploy — don't let ArgoCD revert them to REPLACE_ME.
    - group: ""
      kind: ConfigMap
      name: hookshot-registration
      namespace: matrix
      jsonPointers: ["/data"]
    - group: ""
      kind: ConfigMap
      name: hookshot-config
      namespace: matrix
      jsonPointers: ["/data"]
    - group: ""
      kind: ConfigMap
      name: maubot-registration
      namespace: matrix
      jsonPointers: ["/data"]
    - group: ""
      kind: ConfigMap
      name: maubot-config
      namespace: matrix
      jsonPointers: ["/data"]
    - group: ""
      kind: ConfigMap
      name: mautrix-discord-registration
      namespace: matrix
      jsonPointers: ["/data"]
    - group: ""
      kind: ConfigMap
      name: mautrix-discord-config
      namespace: matrix
      jsonPointers: ["/data"]

