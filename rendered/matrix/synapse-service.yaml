apiVersion: v1
kind: Service
metadata:
  name: synapse
  namespace: matrix
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  type: ClusterIP
  selector: { app: synapse }
  ports:
  - { name: http, port: 8008, targetPort: 8008 }
---
apiVersion: v1
kind: Service
metadata:
  name: synapse-admin-nodeport
  namespace: matrix
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  type: NodePort
  selector: { app: synapse }
  ports:
  - name: http
    port: 8008
    targetPort: 8008
    nodePort: 30800

