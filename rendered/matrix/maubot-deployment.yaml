apiVersion: apps/v1
kind: Deployment
metadata:
  name: maubot
  namespace: matrix
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: maubot }
  template:
    metadata:
      labels: { app: maubot }
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-w3
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      containers:
      - name: maubot
        image: dock.mau.dev/maubot/maubot:v0.5.0
        ports:
        - { name: http, containerPort: 29316 }
        readinessProbe:
          httpGet: { path: /_matrix/maubot/v1/version, port: 29316 }
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests: { cpu: 50m,  memory: 128Mi }
          limits:   { cpu: 500m, memory: 512Mi }
        env:
        - name: UID
          value: "1337"
        - name: GID
          value: "1337"
        volumeMounts:
        - { name: data,   mountPath: /data }
        - { name: config, mountPath: /data/config.yaml, subPath: config.yaml, readOnly: true }
      volumes:
      - name: data
        persistentVolumeClaim: { claimName: maubot-plugins }
      - name: config
        configMap:
          name: maubot-config
          items: [{ key: config.yaml, path: config.yaml }]

