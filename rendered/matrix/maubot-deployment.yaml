apiVersion: apps/v1
kind: Deployment
metadata:
  name: maubot
  namespace: matrix
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: maubot }
  template:
    metadata:
      labels: { app: maubot }
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-w3
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      initContainers:
      # maubot wants to own /data/config.yaml (it rewrites it in
      # place at startup with merged defaults, which fails with
      # "Resource busy" when the file is a read-only subPath
      # mount). And it expects ./plugins, ./plugins/dbs to exist
      # relative to /data. Seed both from the ConfigMap template
      # into the PVC on first boot.
      - name: prepare-data
        image: dock.mau.dev/maubot/maubot:v0.5.0
        command:
        - sh
        - -c
        - |
          set -e
          mkdir -p /data/plugins/dbs /data/trash /data/logs
          if [ ! -f /data/config.yaml ]; then
            cp /config-template/config.yaml /data/config.yaml
          fi
          chown -R 1337:1337 /data
        volumeMounts:
        - { name: data,            mountPath: /data }
        - { name: config-template, mountPath: /config-template, readOnly: true }
        securityContext:
          runAsUser: 0
      containers:
      - name: maubot
        image: dock.mau.dev/maubot/maubot:v0.5.0
        ports:
        - { name: http, containerPort: 29316 }
        # /_matrix/maubot/v1/version requires auth (returns 401
        # without a token), so we can't use it for probes. A TCP
        # check confirms the aiohttp server is up and binding.
        readinessProbe:
          tcpSocket: { port: 29316 }
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests: { cpu: 50m,  memory: 128Mi }
          limits:   { cpu: 500m, memory: 512Mi }
        env:
        - name: UID
          value: "1337"
        - name: GID
          value: "1337"
        # PG password out of the ConfigMap — see mautrix-discord.nix
        # for the rationale (lib/pq respects PGPASSWORD). maubot
        # uses asyncpg but it also honours PGPASSWORD.
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: matrix-secrets
              key: pg_app_password
        volumeMounts:
        - { name: data, mountPath: /data }
      volumes:
      - name: data
        persistentVolumeClaim: { claimName: maubot-plugins }
      - name: config-template
        configMap:
          name: maubot-config
          items: [{ key: config.yaml, path: config.yaml }]

