apiVersion: apps/v1
kind: Deployment
metadata:
  name: element
  namespace: matrix
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  replicas: 2
  selector:
    matchLabels: { app: element }
  template:
    metadata:
      labels: { app: element }
    spec:
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      containers:
      - name: element
        image: vectorim/element-web:v1.11.84
        ports:
        - { name: http, containerPort: 80 }
        readinessProbe:
          httpGet: { path: /, port: 80 }
          initialDelaySeconds: 3
          periodSeconds: 5
        resources:
          requests: { cpu: 20m,  memory: 32Mi }
          limits:   { cpu: 200m, memory: 128Mi }
        volumeMounts:
        - name: config
          mountPath: /app/config.json
          subPath: config.json
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: element-config
          items: [{ key: config.json, path: config.json }]

