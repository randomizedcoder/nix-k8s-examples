apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: matrix
  namespace: matrix
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-lab
    argocd.argoproj.io/sync-wave: "5"
    # The old nginx.ingress.kubernetes.io/proxy-body-size /
    # proxy-{read,send}-timeout annotations don't translate to
    # Cilium's Envoy. Upload cap is enforced server-side by
    # Synapse's max_upload_size: 50M. If Element reports /sync
    # disconnects, add a CiliumEnvoyConfig patch for
    # stream_idle_timeout (Envoy default is 5m, nginx was 10m).
spec:
  ingressClassName: cilium
  tls:
  - hosts:
    - matrix.lab.local
    - element.lab.local
    - hookshot.lab.local
    - maubot.lab.local
    secretName: matrix-tls
  rules:
  # Synapse: homeserver client + (phase-2) federation API, plus
  # .well-known delegation. Federation paths served by the same
  # container in phase 1 even though federation is disabled in
  # homeserver.yaml — lets us flip the switch without re-routing.
  - host: matrix.lab.local
    http:
      paths:
      - path: /_matrix
        pathType: Prefix
        backend:
          service:
            name: synapse
            port: { number: 8008 }
      - path: /_synapse
        pathType: Prefix
        backend:
          service:
            name: synapse
            port: { number: 8008 }
      - path: /.well-known/matrix
        pathType: Prefix
        backend:
          service:
            name: synapse
            port: { number: 8008 }
  # Element Web (community UI).
  - host: element.lab.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: element
            port: { number: 80 }
  # Hookshot webhooks — GitHub/GitLab/Jira POST here.
  - host: hookshot.lab.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: hookshot
            port: { number: 9000 }
  # Maubot management UI.
  - host: maubot.lab.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: maubot
            port: { number: 29316 }

