apiVersion: v1
kind: Service
metadata:
  name: hookshot
  namespace: matrix
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  type: ClusterIP
  selector: { app: hookshot }
  ports:
  - { name: webhook,    port: 9000, targetPort: 9000 }
  - { name: appservice, port: 9993, targetPort: 9993 }

