apiVersion: v1
kind: ConfigMap
metadata:
  name: maubot-config
  namespace: matrix
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/compare-options: IgnoreExtraneous
data:
  config.yaml: |
    database: postgresql://app@pg-rw.postgres.svc.cluster.local/maubot
    crypto_database: default
    plugin_directories:
      upload: ./plugins
      load:
      - ./plugins
      trash: delete
      db: ./plugins/dbs
    plugin_databases:
      postgres: postgresql://app@pg-rw.postgres.svc.cluster.local/maubot
      postgres_max_conns_per_plugin: 3
      sqlite: ./plugins/dbs
    server:
      hostname: 0.0.0.0
      port: 29316
      public_url: https://maubot.lab.local
      unshared_secret: REPLACE_ME_MAUBOT_UNSHARED_SECRET
    admins:
      admin: REPLACE_ME_MAUBOT_ADMIN_BCRYPT
    homeservers:
      matrix.lab.local:
        url: http://synapse.matrix.svc.cluster.local:8008
        secret: REPLACE_ME_MAUBOT_AS_TOKEN
    logging:
      version: 1
      formatters:
        colored:
          (): maubot.lib.color_log.ColorFormatter
          format: "[%(asctime)s] [%(levelname)s@%(name)s] %(message)s"
      handlers:
        console:
          class: logging.StreamHandler
          formatter: colored
      loggers:
        maubot:   { level: DEBUG }
        mau:      { level: DEBUG }
        aiohttp:  { level: INFO }
      root:
        level: DEBUG
        handlers: [console]

