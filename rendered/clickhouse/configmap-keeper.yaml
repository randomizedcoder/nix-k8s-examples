apiVersion: v1
kind: ConfigMap
metadata:
  name: ck-keeper-config
  namespace: clickhouse
data:
  keeper_config.xml: |
    <clickhouse>
      <logger>
        <level>information</level>
        <console>1</console>
      </logger>
      <listen_host>0.0.0.0</listen_host>
      <keeper_server>
        <tcp_port>9181</tcp_port>
        <server_id from_env="KEEPER_SERVER_ID"/>
        <log_storage_path>/var/lib/clickhouse-keeper/log</log_storage_path>
        <snapshot_storage_path>/var/lib/clickhouse-keeper/snapshots</snapshot_storage_path>
        <coordination_settings>
          <operation_timeout_ms>10000</operation_timeout_ms>
          <session_timeout_ms>30000</session_timeout_ms>
          <raft_logs_level>information</raft_logs_level>
        </coordination_settings>
        <raft_configuration>
          <server>
            <id>1</id>
            <hostname>clickhouse-keeper-0.ck-keeper-headless.clickhouse.svc.cluster.local</hostname>
            <port>9234</port>
          </server>
          <server>
            <id>2</id>
            <hostname>clickhouse-keeper-1.ck-keeper-headless.clickhouse.svc.cluster.local</hostname>
            <port>9234</port>
          </server>
          <server>
            <id>3</id>
            <hostname>clickhouse-keeper-2.ck-keeper-headless.clickhouse.svc.cluster.local</hostname>
            <port>9234</port>
          </server>
        </raft_configuration>
      </keeper_server>
    </clickhouse>

