apiVersion: v1
kind: Service
metadata:
  name: ck-keeper-headless
  namespace: clickhouse
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: clickhouse-keeper
  ports:
  - name: client
    port: 9181
    targetPort: 9181
  - name: raft
    port: 9234
    targetPort: 9234

