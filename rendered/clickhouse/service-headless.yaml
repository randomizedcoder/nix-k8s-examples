apiVersion: v1
kind: Service
metadata:
  name: clickhouse-headless
  namespace: clickhouse
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: clickhouse
  ports:
  - name: http
    port: 8123
    targetPort: 8123
  - name: native
    port: 9000
    targetPort: 9000
  - name: interserver
    port: 9009
    targetPort: 9009

