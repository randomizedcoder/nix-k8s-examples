apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-config
  namespace: clickhouse
data:
  cluster.xml: |
    <clickhouse>
      <listen_host>0.0.0.0</listen_host>
      <http_port>8123</http_port>
      <tcp_port>9000</tcp_port>
      <interserver_http_port>9009</interserver_http_port>
      <interserver_http_host from_env="POD_FQDN"/>
      <remote_servers>
        <ch4>
          <shard>
            <internal_replication>true</internal_replication>
            <replica>
              <host>clickhouse-0.clickhouse-headless.clickhouse.svc.cluster.local</host>
              <port>9000</port>
            </replica>
            <replica>
              <host>clickhouse-1.clickhouse-headless.clickhouse.svc.cluster.local</host>
              <port>9000</port>
            </replica>
          </shard>
          <shard>
            <internal_replication>true</internal_replication>
            <replica>
              <host>clickhouse-2.clickhouse-headless.clickhouse.svc.cluster.local</host>
              <port>9000</port>
            </replica>
            <replica>
              <host>clickhouse-3.clickhouse-headless.clickhouse.svc.cluster.local</host>
              <port>9000</port>
            </replica>
          </shard>
        </ch4>
      </remote_servers>
      <zookeeper>
        <node>
          <host>clickhouse-keeper-0.ck-keeper-headless.clickhouse.svc.cluster.local</host>
          <port>9181</port>
        </node>
        <node>
          <host>clickhouse-keeper-1.ck-keeper-headless.clickhouse.svc.cluster.local</host>
          <port>9181</port>
        </node>
        <node>
          <host>clickhouse-keeper-2.ck-keeper-headless.clickhouse.svc.cluster.local</host>
          <port>9181</port>
        </node>
      </zookeeper>
      <distributed_ddl>
        <path>/clickhouse/task_queue/ddl</path>
      </distributed_ddl>
    </clickhouse>
  init-macros.sh: |
    #!/bin/sh
    set -e
    ordinal=${HOSTNAME##*-}
    shard=$((ordinal / 2 + 1))
    replica=$((ordinal % 2 + 1))
    cat > /macros-out/macros.xml <<EOF
    <clickhouse>
      <macros>
        <cluster>ch4</cluster>
        <shard>$shard</shard>
        <replica>$replica</replica>
      </macros>
    </clickhouse>
    EOF
    echo "ordinal=$ordinal shard=$shard replica=$replica"

