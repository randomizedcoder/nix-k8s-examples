apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clickstack
  namespace: observability
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-lab
    argocd.argoproj.io/sync-wave: "5"
spec:
  ingressClassName: cilium
  tls:
  - hosts:
    - clickstack.lab.local
    secretName: clickstack-tls
  rules:
  - host: clickstack.lab.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: clickstack-app
            port: { number: 3000 }

