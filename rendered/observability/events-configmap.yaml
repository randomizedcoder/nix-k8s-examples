apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-events-config
  namespace: observability
data:
  config.yaml: |
    receivers:
      k8sobjects:
        objects:
        - name: events
          mode: watch
          group: events.k8s.io
          exclude_watch_type:
          - DELETED
    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 25
      batch:
        timeout: 5s
        send_batch_size: 1024
    exporters:
      otlp:
        endpoint: otel-collector.observability.svc.cluster.local:4317
        tls:
          insecure: true
    service:
      telemetry:
        metrics:
          address: 0.0.0.0:8888
      pipelines:
        logs:
          receivers: [k8sobjects]
          processors: [memory_limiter, batch]
          exporters: [otlp]

