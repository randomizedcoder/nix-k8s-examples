apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/randomizedcoder/nix-k8s-examples.git
    targetRevision: main
    path: rendered/observability
    directory:
      recurse: false
      exclude: '{application.yaml,collector-values.yaml,clickstack-values.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    # Bootstrap-secrets script overwrites these Secrets'
    # data out-of-band. Prevent ArgoCD from reverting real
    # creds back to the placeholders on every self-heal.
    - group: ""
      kind: Secret
      name: otel-ch-credentials
      namespace: observability
      jsonPointers: ["/data", "/stringData"]
    - group: ""
      kind: Secret
      name: clickstack-hyperdx-config
      namespace: observability
      jsonPointers: ["/data", "/stringData"]

