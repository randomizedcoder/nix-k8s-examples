apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: clickstack-tls
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  secretName: clickstack-tls
  duration: 2160h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
  dnsNames:
  - clickstack.lab.local
  issuerRef:
    name: selfsigned-lab
    kind: ClusterIssuer
    group: cert-manager.io

