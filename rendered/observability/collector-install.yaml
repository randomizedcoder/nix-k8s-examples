# Source: opentelemetry-collector/templates/configmap-agent.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-opentelemetry-collector-agent
  namespace: observability
  labels:
    helm.sh/chart: opentelemetry-collector-0.140.0
    app.kubernetes.io/name: opentelemetry-collector
    app.kubernetes.io/instance: otel-collector
    app.kubernetes.io/version: "0.140.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: opentelemetry-collector
    app.kubernetes.io/component: agent-collector
data:
  relay: |
    exporters:
      clickhouse:
        create_schema: false
        database: otel
        endpoint: tcp://127.0.0.1:9000?dial_timeout=10s&compress=lz4
        logs_table_name: otel_logs_dist
        metrics_tables:
          exponential_histogram:
            name: otel_metrics_exponential_histogram_dist
          gauge:
            name: otel_metrics_gauge_dist
          histogram:
            name: otel_metrics_histogram_dist
          sum:
            name: otel_metrics_sum_dist
          summary:
            name: otel_metrics_summary_dist
        password: ${env:CLICKHOUSE_PASSWORD}
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_elapsed_time: 300s
          max_interval: 30s
        sending_queue:
          enabled: true
          queue_size: 5000
        timeout: 10s
        traces_table_name: otel_traces_dist
        ttl: 0s
        username: ${env:CLICKHOUSE_USER}
      debug: {}
    extensions:
      health_check:
        endpoint: ${env:MY_POD_IP}:13133
    processors:
      batch:
        send_batch_max_size: 16384
        send_batch_size: 8192
        timeout: 5s
      k8sattributes:
        auth_type: serviceAccount
        extract:
          labels:
          - from: pod
            key: app.kubernetes.io/name
            tag_name: app
          metadata:
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.namespace.name
          - k8s.node.name
          - k8s.deployment.name
          otel_annotations: true
        filter:
          node_from_env_var: K8S_NODE_NAME
        passthrough: false
        pod_association:
        - sources:
          - from: resource_attribute
            name: k8s.pod.ip
        - sources:
          - from: connection
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 25
    receivers:
      filelog:
        exclude:
        - /var/log/pods/observability_otel-collector-opentelemetry-collector*_*/opentelemetry-collector/*.log
        include:
        - /var/log/pods/*/*/*.log
        include_file_name: false
        include_file_path: true
        operators:
        - id: container-parser
          max_log_size: 102400
          type: container
        retry_on_failure:
          enabled: true
        start_at: end
      hostmetrics:
        collection_interval: 10s
        root_path: /hostfs
        scrapers:
          cpu: null
          disk: null
          filesystem:
            exclude_fs_types:
              fs_types:
              - autofs
              - binfmt_misc
              - bpf
              - cgroup2
              - configfs
              - debugfs
              - devpts
              - devtmpfs
              - fusectl
              - hugetlbfs
              - iso9660
              - mqueue
              - nsfs
              - overlay
              - proc
              - procfs
              - pstore
              - rpc_pipefs
              - securityfs
              - selinuxfs
              - squashfs
              - sysfs
              - tracefs
              match_type: strict
            exclude_mount_points:
              match_type: regexp
              mount_points:
              - /dev/*
              - /proc/*
              - /sys/*
              - /run/k3s/containerd/*
              - /var/lib/docker/*
              - /var/lib/kubelet/*
              - /snap/*
          load: null
          memory: null
          network: null
      jaeger:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:14250
          thrift_compact:
            endpoint: ${env:MY_POD_IP}:6831
          thrift_http:
            endpoint: ${env:MY_POD_IP}:14268
      kubeletstats:
        auth_type: serviceAccount
        collection_interval: 20s
        endpoint: ${env:K8S_NODE_IP}:10250
      otlp:
        protocols:
          grpc:
            endpoint: /var/run/otel/collector.sock
            transport: unix
          http:
            endpoint: 0.0.0.0:4318
      otlp/cluster:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
      prometheus:
        config:
          scrape_configs:
          - job_name: opentelemetry-collector
            scrape_interval: 10s
            static_configs:
            - targets:
              - ${env:MY_POD_IP}:8888
      prometheusremotewrite:
        endpoint: 0.0.0.0:9411
      zipkin:
        endpoint: ${env:MY_POD_IP}:9411
    service:
      extensions:
      - health_check
      pipelines:
        logs:
          exporters:
          - clickhouse
          processors:
          - memory_limiter
          - k8sattributes
          - batch
          receivers:
          - otlp
          - otlp/cluster
          - filelog
        metrics:
          exporters:
          - clickhouse
          processors:
          - memory_limiter
          - k8sattributes
          - batch
          receivers:
          - otlp
          - otlp/cluster
          - hostmetrics
          - kubeletstats
          - prometheusremotewrite
        traces:
          exporters:
          - clickhouse
          processors:
          - memory_limiter
          - k8sattributes
          - batch
          receivers:
          - otlp
          - otlp/cluster
      telemetry:
        metrics:
          readers:
          - pull:
              exporter:
                prometheus:
                  host: 0.0.0.0
                  port: 8888
