---
# ── Phase 1: lab self-signed ───────────────────────────────────
# A bootstrap "selfsigned" issuer lets us sign a root cert that
# becomes the in-cluster CA. Ingress resources then reference
# `selfsigned-lab` as their cluster-issuer.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: selfsigned-lab-ca
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  isCA: true
  commonName: selfsigned-lab-ca
  secretName: selfsigned-lab-ca-cert
  duration: 87600h0m0s   # 10y
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-lab
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  ca:
    secretName: selfsigned-lab-ca-cert
---
# ── Phase 2: Let's Encrypt DNS-01 via RFC2136 → PowerDNS ──────
# Uses PowerDNS authoritative DNS (VIP 10.33.33.52) for
# DNS-01 ACME challenges. TSIG key authenticates dynamic updates.
# The pdns-tsig-secret Secret is pre-generated by nix/secrets.nix.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod-dns01
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@seddon.ca
    privateKeySecretRef:
      name: letsencrypt-prod-dns01-account-key
    solvers:
    - dns01:
        rfc2136:
          nameserver: 10.33.33.52:53
          tsigKeyName: acme-update
          tsigAlgorithm: HMACSHA256
          tsigSecretSecretRef:
            name: pdns-tsig-secret
            key: tsig-secret-key
      selector:
        dnsZones:
        - "seddon.ca"
        - "xtcp.io"

